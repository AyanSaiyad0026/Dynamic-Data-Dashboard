<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Payment Form</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:#1f2937;color:#f3f4f6}
.container{width:420px;background:#111827;padding:30px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.35)}
h2{text-align:center;margin-bottom:20px}
.form-group{margin-bottom:15px}
label{display:block;margin-bottom:6px}
input,select{width:100%;padding:12px;border:none;outline:none;border-radius:10px;background:#374151;color:#fff}
.row{display:flex;gap:12px}
.row .form-group{flex:1}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#2563eb;color:#fff;cursor:pointer}
.error{color:#f87171;font-size:13px;margin-top:4px}
.success{color:#4ade80;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="container">
<h2>Credit Card Payment</h2>

<form id="cardForm">
<div class="form-group">
<label>Cardholder Name</label>
<input type="text" id="name" placeholder="John Smith" maxlength="40" required>
<div class="error" id="nameError"></div>
</div>

<div class="form-group">
<label>Card Number</label>
<input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
<div class="error" id="cardError"></div>
</div>

<div class="form-group">
<label>Card Company</label>
<select id="company" required>
<option value="">Select Company</option>
<option>Visa</option>
<option>MasterCard</option>
<option>RuPay</option>
<option>American Express</option>
</select>
</div>

<div class="row">
<div class="form-group">
<label>Expiry Date</label>
<input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
<div class="error" id="expiryError"></div>
</div>

<div class="form-group">
<label>CVV</label>
<input type="password" id="cvv" placeholder="1234" maxlength="4" required>
<div class="error" id="cvvError"></div>
</div>
</div>

<button type="submit">Pay Now</button>
<div class="success" id="successMsg"></div>
</form>
</div>

<script>
const nameInput=document.getElementById("name");
const cardInput=document.getElementById("cardNumber");
const expiryInput=document.getElementById("expiry");
const cvvInput=document.getElementById("cvv");

nameInput.addEventListener("input",()=>{
nameInput.value=nameInput.value.replace(/[^A-Za-z ]/g,"");
});

cardInput.addEventListener("input",()=>{
let v=cardInput.value.replace(/\D/g,"").slice(0,16);
cardInput.value=(v.match(/.{1,4}/g)||[]).join(" ");
});

expiryInput.addEventListener("input",()=>{
let v=expiryInput.value.replace(/\D/g,"").slice(0,4);
if(v.length>2)v=v.slice(0,2)+"/"+v.slice(2);
expiryInput.value=v;
});

cvvInput.addEventListener("input",()=>{
cvvInput.value=cvvInput.value.replace(/\D/g,"").slice(0,4);
});

cardForm.addEventListener("submit",e=>{
e.preventDefault();

nameError.textContent="";
cardError.textContent="";
expiryError.textContent="";
cvvError.textContent="";
successMsg.textContent="";

let valid=true;

if(!/^[A-Za-z ]+$/.test(nameInput.value.trim())){
nameError.textContent="Name must contain only letters.";
valid=false;
}

if(!/^\d{16}$/.test(cardInput.value.replace(/\s/g,""))){
cardError.textContent="Card number must contain exactly 16 digits.";
valid=false;
}

if(!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiryInput.value)){
expiryError.textContent="Expiry date must be MM/YY.";
valid=false;
}

if(!/^\d{4}$/.test(cvvInput.value)){
cvvError.textContent="CVV must be exactly 4 digits.";
valid=false;
}

if(valid){
successMsg.textContent="Payment details validated successfully!";
}
});
</script>
</body>
</html>
