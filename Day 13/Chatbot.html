<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayan's Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #161a23;
      --card:       #1e2330;
      --border:     #2a3045;
      --accent:     #4f8ef7;
      --accent-dim: #1e3a6e;
      --text:       #e8ecf4;
      --muted:      #7b859e;
      --user-bg:    #4f8ef7;
      --user-text:  #ffffff;
      --bot-bg:     #1e2330;
      --bot-text:   #e8ecf4;
      --radius:     18px;
      --input-h:    52px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .shell {
      width: 100%;
      max-width: 480px;
      height: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      background: var(--card);
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #7c5cfc 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .header-info h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: .01em;
    }

    .header-info p {
      font-size: 12px; color: var(--muted); margin-top: 2px;
      display: flex; align-items: center; gap: 5px;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #34d399; flex-shrink: 0;
    }

    #chat-history {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }

    #chat-history::-webkit-scrollbar { width: 4px; }
    #chat-history::-webkit-scrollbar-track { background: transparent; }
    #chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.bot  { flex-direction: row; }

    .msg-icon {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-row.user .msg-icon { background: var(--accent); color: #fff; }
    .msg-row.bot  .msg-icon { background: var(--card); border: 1px solid var(--border); }

    .bubble {
      max-width: 75%;
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px; line-height: 1.55;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--user-bg); color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .msg-row.bot .bubble {
      background: var(--bot-bg); color: var(--bot-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown styles inside bot bubbles */
    .msg-row.bot .bubble strong { color: #a5c8ff; font-weight: 600; }
    .msg-row.bot .bubble em     { color: #c9b8ff; font-style: italic; }
    .msg-row.bot .bubble code {
      background: #0d1117; color: #79c0ff;
      padding: 1px 5px; border-radius: 4px;
      font-family: 'Courier New', monospace; font-size: 12.5px;
    }
    .msg-row.bot .bubble ul,
    .msg-row.bot .bubble ol {
      padding-left: 18px; margin-top: 4px;
    }
    .msg-row.bot .bubble li { margin-top: 3px; }
    .msg-row.bot .bubble p + p { margin-top: 6px; }

    .typing-dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--muted);
      margin: 0 2px; animation: bounce 1.1s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    .input-bar {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center;
      flex-shrink: 0; background: var(--card);
    }

    #user-input {
      flex: 1; height: var(--input-h);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px; padding: 0 16px;
      outline: none; transition: border-color .2s;
    }

    #user-input::placeholder { color: var(--muted); }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: var(--input-h); height: var(--input-h);
      border-radius: 14px; border: none;
      background: var(--accent); color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s, transform .1s;
    }

    #send-btn:hover   { background: #3a7de8; }
    #send-btn:active  { transform: scale(.94); }
    #send-btn:disabled { background: var(--accent-dim); cursor: not-allowed; }
  </style>
</head>
<body>

<div class="shell">

  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>Ayan's Portfolio Assistant</h1>
      <p><span class="dot"></span>Online · Powered by Gemini</p>
    </div>
  </header>

  <div id="chat-history"></div>

  <div class="input-bar">
    <input id="user-input" type="text" placeholder="Ask me about Ayan…" autocomplete="off" />
    <button id="send-btn" aria-label="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const API_KEY = "YOUR_API_KEY";

  const SYSTEM_INSTRUCTION =
    "You are the personal portfolio assistant for Ayan. " +
    "Ayan is a student at Government Polytechnic Gandhinagar. " +
    "His skills include: HTML, CSS, JavaScript, Advanced Python, Java, " +
    "UI/UX design, Thumbnail design, and Video editing. " +
    "Only answer questions about Ayan and his portfolio. " +
    "Politely refuse all unrelated topics. Keep answers concise and friendly.";

  // Conversation history kept in memory for multi-turn context
  const conversationHistory = [];

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const chatHistory = document.getElementById("chat-history");
  const input       = document.getElementById("user-input");
  const sendBtn     = document.getElementById("send-btn");

  // ── Minimal markdown → HTML ────────────────────────────────────────────────
  function renderMarkdown(text) {
    return text
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/__(.+?)__/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/_(.+?)_/g, "<em>$1</em>")
      .replace(/^[*-] (.+)/gm, "<li>$1</li>")
      .replace(/(<li>[\s\S]*<\/li>)/, "<ul>$1</ul>")
      .replace(/\n/g, "<br/>");
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function appendMessage(text, role) {
    const row    = document.createElement("div");
    row.className = `msg-row ${role}`;

    const icon   = document.createElement("div");
    icon.className = "msg-icon";
    icon.textContent = role === "user" ? "👤" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (role === "bot") {
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }

    row.appendChild(icon);
    row.appendChild(bubble);
    chatHistory.appendChild(row);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function showTyping() {
    const row    = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-row";

    const icon   = document.createElement("div");
    icon.className = "msg-icon";
    icon.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML =
      `<div class="typing-dots">
         <span></span><span></span><span></span>
       </div>`;

    row.appendChild(icon);
    row.appendChild(bubble);
    chatHistory.appendChild(row);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-row");
    if (el) el.remove();
  }

  // ── Send handler ───────────────────────────────────────────────────────────
  async function handleSend() {
    const text = input.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    input.value = "";
    sendBtn.disabled = true;
    showTyping();

    // Add user turn to history
    conversationHistory.push({ role: "user", parts: [{ text }] });

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
            contents: conversationHistory
          })
        }
      );

      const data  = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || "API error " + response.status);
      }

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't understand that.";

      // Add assistant turn to history
      conversationHistory.push({ role: "model", parts: [{ text: reply }] });

      removeTyping();
      appendMessage(reply, "bot");
    } catch (err) {
      removeTyping();
      appendMessage("⚠️ " + (err.message || "Something went wrong. Please try again."), "bot");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  sendBtn.addEventListener("click", handleSend);
  input.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });

  // ── Greeting ───────────────────────────────────────────────────────────────
  appendMessage("Hi! I am Ayan's virtual assistant. How can I help you today?", "bot");
  input.focus();
</script>

</body>
</html>
