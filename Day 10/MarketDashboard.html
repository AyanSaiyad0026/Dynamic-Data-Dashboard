<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1f1f1f;
    --border-light: #2a2a2a;
    --text: #f0f0f0;
    --muted: #555;
    --accent: #e879f9;
    --accent-dim: rgba(232,121,249,0.08);
    --red: #ff4d4d;
    --green: #34d399;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 48px 40px;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 56px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
  }

  .header-left h1 {
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .header-left h1 span {
    color: var(--accent);
  }

  .header-left p {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Grid */
  .dashboard {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .card {
    background: var(--surface);
    padding: 28px;
    cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    background: #161616;
  }

  .card.active {
    background: var(--accent-dim);
  }

  .card.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 100%;
    background: var(--accent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.30s; }
  .card:nth-child(7) { animation-delay: 0.35s; }
  .card:nth-child(8) { animation-delay: 0.40s; }
  .card:nth-child(9) { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.50s; }
  .card:nth-child(11) { animation-delay: 0.55s; }
  .card:nth-child(12) { animation-delay: 0.60s; }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .category-tag {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--border-light);
    padding: 3px 8px;
    border-radius: 2px;
  }

  .change-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .change-badge.up {
    color: var(--green);
    background: rgba(52,211,153,0.12);
  }

  .change-badge.down {
    color: var(--red);
    background: rgba(255,77,77,0.1);
  }

  .brand {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  .product-name {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 16px;
  }

  .price {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .price-sym {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--muted);
    margin-right: 2px;
  }

  .stock-bar-wrap {
    margin-bottom: 20px;
  }

  .stock-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stock-bar {
    height: 2px;
    background: var(--border-light);
    border-radius: 1px;
    overflow: hidden;
  }

  .stock-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .stock-fill.low {
    background: var(--red);
  }

  .cta {
    width: 100%;
    padding: 10px 0;
    background: transparent;
    border: 1px solid var(--border-light);
    border-radius: 2px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .cta:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Payload panel */
  .payload-panel {
    max-width: 1200px;
    margin: 1px auto 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
  }

  .payload-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }

  .payload-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .payload-status {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .payload-body {
    padding: 24px 28px;
    font-family: var(--mono);
    font-size: 0.78rem;
    line-height: 1.8;
    color: #888;
    min-height: 140px;
    white-space: pre;
    overflow-x: auto;
  }

  .payload-body .key { color: #6b9fff; }
  .payload-body .string { color: #e879f9; }
  .payload-body .number { color: #ff9d3d; }
  .payload-body .bool { color: #ff6b9d; }
  .payload-body .null-val { color: var(--muted); }

  .placeholder-text {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
    line-height: 2;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Market<span>.</span>Dashboard</h1>
    <p>Real-time product intelligence feed</p>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    Live Feed

<div class="dashboard" id="dashboard"></div>

  </div>
  <div class="payload-body" id="payload">
    <span class="placeholder-text">// Select any product card above to simulate an API call
// Structured JSON response will render here</span>

</div>

<script>

  }
];

// ─── DOM Injection ────────────────────────────────────────────────────────────
const dashboard = document.getElementById("dashboard");
let activeCard = null;

products.forEach(p => {
  const stockPct = Math.round((p.stock / p.maxStock) * 100);
  const isLow = p.stock <= 8;
  const isUp = p.change >= 0;

  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = p.id;

  card.innerHTML = `
    <div class="card-meta">
      <span class="category-tag">${p.category}</span>
      <span class="change-badge ${isUp ? 'up' : 'down'}">${isUp ? '▲' : '▼'} ${Math.abs(p.change)}%</span>
    </div>
    <div class="brand">${p.brand}</div>
    <div class="product-name">${p.product}</div>
    <div class="price-row">
      <span class="price-sym">₹</span>
      <span class="price">${p.price.toLocaleString('en-IN')}</span>
    </div>
    <div class="stock-bar-wrap">
      <div class="stock-label">
        <span>Stock</span>
        <span>${p.stock} / ${p.maxStock} units</span>
      </div>
      <div class="stock-bar">
        <div class="stock-fill ${isLow ? 'low' : ''}" style="width:${stockPct}%"></div>
      </div>
    </div>
    <button class="cta" onclick="simulateAPI('${p.id}')">View API Response →</button>
  `;

  dashboard.appendChild(card);
});

// ─── API Simulation ───────────────────────────────────────────────────────────
function simulateAPI(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  // Update active card state
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const thisCard = document.querySelector(`.card[data-id="${id}"]`);
  if (thisCard) thisCard.classList.add('active');

  const payload = {
    status: "200 OK",
    timestamp: new Date().toISOString(),
    source: "market-dashboard/v2.1",
    request: {
      action: "product_fetch",
      product_id: p.id,
      sku: p.sku
    },
    data: {
      brand: p.brand,
      product: p.product,
      category: p.category,
      pricing: {
        current: p.price,
        original: p.originalPrice,
        currency: "INR",
        discount_pct: Math.round(((p.originalPrice - p.price) / p.originalPrice) * 100)
      },
      inventory: {
        available: p.stock,
        total_capacity: p.maxStock,
        stock_level: p.stock <= 8 ? "LOW" : "NORMAL",
        fill_rate: `${Math.round((p.stock / p.maxStock) * 100)}%`
      },
      market: {
        change_24h: `${p.change > 0 ? '+' : ''}${p.change}%`,
        trend: p.change >= 0 ? "BULLISH" : "BEARISH",
        rating: p.rating
      }
    }
  };

  document.getElementById("payload-status").textContent = `200 OK · ${new Date().toLocaleTimeString()}`;
  document.getElementById("payload").innerHTML = syntaxHighlight(JSON.stringify(payload, null, 2));
}

function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    let cls = 'number';
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? 'key' : 'string';
    } else if (/true|false/.test(match)) {
      cls = 'bool';
    } else if (/null/.test(match)) {
      cls = 'null-val';
    }
    return `<span class="${cls}">${match}</span>`;
  });
}

</html>
